{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  .md-content { display: block; }
  .not-found {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    background: var(--hp-bg);
  }
  .not-found__code {
    font-size: 6rem;
    font-weight: 900;
    color: var(--hp-primary);
    opacity: 0.25;
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 1rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .not-found__title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.75rem;
  }
  .not-found__sub {
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 2rem;
    max-width: 400px;
    line-height: 1.65;
  }
  .not-found__actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>

<div class="not-found">
  <div class="not-found__code">404</div>
  <div class="not-found__title">Page not found</div>
  <div class="not-found__sub">
    This page doesn't exist or has been moved.
    Try the quickstart or search for what you need.
  </div>
  <div class="not-found__actions">
    <a href="{{ '/' | url }}" class="hp-btn hp-btn--primary">Go to home →</a>
    <a href="{{ 'getting-started/' | url }}" class="hp-btn hp-btn--ghost">Quickstart</a>
  </div>
</div>
{% endblock %}
