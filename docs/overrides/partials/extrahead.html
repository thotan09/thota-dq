<!-- Open Graph / Twitter Card meta tags -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Aegis DQ">
<meta property="og:title" content="{% if page and page.title %}{{ page.title }} — Aegis DQ{% else %}Aegis DQ — Agentic Data Quality{% endif %}">
<meta property="og:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Open, audit-grade agentic data quality framework. Point it at your business docs — root causes and remediation SQL come out.{% endif %}">
<meta property="og:url" content="{{ page.canonical_url if page else config.site_url }}">
<meta property="og:image" content="{{ config.site_url }}assets/logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page and page.title %}{{ page.title }} — Aegis DQ{% else %}Aegis DQ{% endif %}">
<meta name="twitter:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Open, audit-grade agentic data quality framework. Business docs in. Root causes out.{% endif %}">
<meta name="twitter:image" content="{{ config.site_url }}assets/logo.png">
