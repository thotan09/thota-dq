- apiVersion: aegis.dev/v1
  kind: DataQualityRule
  logic:
    query: 'SELECT a.account_id, a.customer_id, a.country_code, c.country_of_residence,
      a.international_travel_flag

      FROM accounts a

      JOIN customers c ON a.customer_id = c.customer_id

      WHERE a.country_code != c.country_of_residence AND a.international_travel_flag
      = FALSE

      '
    type: custom_sql
  metadata:
    generated_by: claude-haiku-4-5-20251001
    id: accounts_geographic_mismatch_without_travel_flag
    severity: medium
    status: draft
    version: 1.0.0
  scope:
    table: accounts
