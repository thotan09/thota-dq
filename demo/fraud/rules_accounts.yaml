- apiVersion: aegis.dev/v1
  kind: DataQualityRule
  logic:
    expression: opened_date <= last_activity_date
    type: sql_expression
  metadata:
    generated_by: claude-haiku-4-5-20251001
    id: accounts_opened_date_before_last_activity
    severity: critical
    status: draft
    version: 1.0.0
  scope:
