- apiVersion: aegis.dev/v1
  kind: DataQualityRule
  logic:
    query: "SELECT cf.flag_id, cf.txn_id, cf.account_id\nFROM compliance_flags cf\n\
      WHERE cf.txn_id IS NOT NULL\nAND NOT EXISTS (\n  SELECT 1 FROM transactions\
      \ t WHERE t.txn_id = cf.txn_id\n)\n"
    type: custom_sql
  metadata:
